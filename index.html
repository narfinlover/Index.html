<!DOCTYPE html>
<html>
<head>
  <title>Private World Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    #chat {
      height: 400px;
      overflow-y: auto;
      background: #222;
      padding: 10px;
      border-radius: 10px;
    }

    input {
      padding: 10px;
      width: 75%;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      width: 20%;
    }

    .msg {
      background: #333;
      margin: 5px;
      padding: 8px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>Private World 🌎</h2>

<div id="chat"></div>

<input id="message" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>


<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";


const supabaseUrl = "https://yfmvqdicqirsjhdxrtjf.supabase.co";
const supabaseKey = "sb_publishable_HOH-C_Z1is6gcRBIoLfvMg_7qGWHeuH";

const supabase = createClient(
  supabaseUrl,
  supabaseKey
);


async function loadMessages(){

  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .order("id");

  if(error){
    console.log(error);
    return;
  }

  document.getElementById("chat").innerHTML = "";

  data.forEach(msg => {
    document.getElementById("chat").innerHTML +=
    `<div class="msg">${msg.text}</div>`;
  });

}


window.sendMessage = async function(){

  const input = document.getElementById("message");

  if(input.value.trim() === "") return;


  const { error } = await supabase
    .from("messages")
    .insert([
      {
        text: input.value
      }
    ]);


  if(error){
    alert(error.message);
  }


  input.value = "";

  loadMessages();

}


loadMessages();


</script>

</body>
</html>
